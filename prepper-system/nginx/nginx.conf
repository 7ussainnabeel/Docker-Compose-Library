limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=5r/s;

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 2g;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: blob:; connect-src 'self';" always;

    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        limit_req zone=general_limit burst=40 nodelay;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /wiki/ {
        limit_req zone=general_limit burst=30 nodelay;
        set $kiwix_upstream http://kiwix:8080;
        proxy_pass $kiwix_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }

    location /search/ {
        limit_req zone=general_limit burst=20 nodelay;
        set $search_upstream http://search:8080;
        proxy_pass $search_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }

    location /files/ {
        limit_req zone=general_limit burst=20 nodelay;
        set $files_upstream http://filebrowser:8080;
        proxy_pass $files_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }

    location /maps/ {
        limit_req zone=general_limit burst=20 nodelay;
        set $maps_upstream http://maps:8080;
        proxy_pass $maps_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }

    location /ollama/ {
        limit_req zone=ai_limit burst=10 nodelay;
        set $ollama_upstream http://ollama:11434;
        proxy_pass $ollama_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }

    location /mesh/api/ {
        limit_req zone=general_limit burst=20 nodelay;
        set $mesh_upstream http://mesh-bridge:8090;
        proxy_pass $mesh_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }
}
