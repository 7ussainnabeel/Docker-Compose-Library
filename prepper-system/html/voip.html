    body {

<body>
  <article class="card">
    <h1>VoIP Node (Asterisk)</h1>
    <p>This system exposes SIP on UDP 5060 and RTP on UDP 10000-10100 for local-only calls.</p>
    <p>Default demo extensions:</p>
    <pre>1001 / prepper1001
1002 / prepper1002</pre>
    <p>Dial <strong>1001</strong> or <strong>1002</strong> from any SIP client on the local network.</p>
    <p>Back to <a href="/">Dashboard</a></p>
  </article>
